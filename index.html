    <script>
        // === AI LOGIC ===
        const submitBtn = document.getElementById('submitBtn');
        const promptInput = document.getElementById('prompt');
        const responseDiv = document.getElementById('response');
        let block1 = `IxUidiCd`;

        let block3 = `tSOK5_w`;
        let block4 = `AIzaSyDd`;
        let block5 = `T4cDhBV6`;
        let apiKey = `${block4}${block2}${block1}${block5}${block3}`;

        let resume = `{

  "summary": "Quantitative Data Scientist and PhD with 14 years of experience driving R&D innovation within the chemical industry. Expert in bridging the gap between physical 
system dynamics (Chemistry/Chemical Engineering) and predictive machine learning. Specialized in developing hybrid models—combining numerical analysis and deep learning—to

  "skills": {

    ],
    "data_stack": [

      "Seaborn"
    ],
    "infrastructure": [
      "Linux",
      "Unix",

    ]
  },
  "experience": [
    {
      "role": "Sr Research Scientist",
      "company": "Grace GmbH",
      "location": "Worms",

      "highlights": [

high-fidelity simulations of high-dimensional system dynamics.",
        "Optimized catalyst and sorbent efficiency by implementing advanced numerical schemes (Finite-Volume, Orthogonal Collocation) to solve complex transport-diffusion PDEs, 
translating molecular-level behavior into macroscopic performance metrics.",
        "Engineered full-stack Python toolkits for automated data preprocessing and model validation, streamlining the transition from theoretical research to industrial design 
applications.",
        "Engineered a predictive analytics pipeline for chemical recipe optimization, resulting in a 23% reduction in global raw material consumption and significant cost 
savings without compromising product quality.",
        "Bridged the gap between Lab R&D and Industrial Production by leading interdisciplinary teams to translate complex quantitative model outputs into actionable, scalable

      ]
    },
    {
      "role": "Research Scientist",

      "highlights": [

        "Minimized experimental waste and optimized multi-variable chemical parameters by applying rigorous Design of Experiments (DoE), ensuring maximum information gain per

        "Acted as Subject Matter Expert for complex system dynamics and global technical problem solving within the adsorbents business."

    },
    {

      "highlights": [

        "Enhanced Fluidized Catalytic Cracking (FCC) efficiency by designing and validating high-precision system modifications for light-oil conversion through a data-driven

  ],
  "education": [
    {
      "degree": "PhD (Dr. rer. nat.)",

    },
    {
      "degree": "Diploma in Chemistry",
      "field": "Chemistry",

      "period": "2000 – 2006"
    }
  ],
  "certifications": [
    "Lean Six Sigma – Green Belt",
    "Project Management Training PDI",
    "Ninth-House – Front Line Leadership"
  ],
  "github_projects": [
    {
      "name": "CausCrypto",
      "description": "Causal inference analysis of cryptocurrencies using Bayesian networks, DAGs, and propensity scoring to evaluate the efficacy of different momentum 
strategies and eliminate spurious correlations."
    },
    {

characterization."
    },
    {
      "name": "FluxCat",
      "description": "High-performance simulation approach for transient system behavior. Implements Finite-Volume algorithms and Runge-Kutta integration to solve coupled 
non-linear PDEs. The GUI is based on Kivy/Python."
    },
    {
      "name": "XrdQty",
      "description": "Synthetic data generation pipeline using physical simulation to train Convolutional Neural Networks (CNN) for automated phase quantification."
    }

        }`;
        let SYSTEM_PROMPT = `You are a professional AI assistant. Your goal is to answer questions about Markus Schindler. If the answer is not in the data, politely say you don't know. Use the following resume data as your only source of truth: ${resume}`;

        submitBtn.addEventListener('click', async () => {
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return alert("Please enter a question!");
            submitBtn.disabled = true;
            submitBtn.innerText = "Thinking...";
            responseDiv.innerText = "Processing...";
            try {
                const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: [{ parts: [{ text: userPrompt }] }]
                    })
                });
                const data = await response.json();
                // DEBUG: Log the full response to the console to see exactly what the API says
                console.log("API Response:", data);

                // CHECK: Verify that the path to the text actually exists
                if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0]) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    responseDiv.innerHTML = marked.parse(aiText);
                } else if (data.error) {
                    // Handle API-level errors (e.g., Invalid API Key)
                    responseDiv.innerText = "API Error: " + data.error.message;
                } else {
                    // Handle safety blocks or empty responses
                    responseDiv.innerText = "The AI couldn't generate a response. It may have been blocked by safety filters.";
                }
            } catch (error) {
                responseDiv.innerText = "Network Error: " + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Send to Cloud";
            }
        });

        // === 3D BACKGROUND LOGIC ===
        const canvas = document.querySelector('#bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(32, 32, 30, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        const gridSize = 10; 
        const spacing = 2;
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const colors = [];
        const baseColor = new THREE.Color(0x008080); 
        const highlightColor = new THREE.Color(0x4dcdcd);

        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                for (let z = 0; z < gridSize; z++) {
                    positions.push((x - gridSize/2) * spacing, (y - gridSize/2) * spacing, (z - gridSize/2) * spacing);
                    colors.push(baseColor.r, baseColor.g, baseColor.b);
                }
            }
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            map: createCircleTexture(),
            alphaTest: 0.5
        });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.set(15, 15, 15); 
        camera.lookAt(0, 0, 0);
        points.position.x = 2;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(points);
            const colorAttr = geometry.attributes.color; 
            const posAttr = geometry.attributes.position;

            for (let i = 0; i < colorAttr.count; i++) {
                const vx = posAttr.getX(i) + points.position.x;
                const vy = posAttr.getY(i) + points.position.y;
                const vz = posAttr.getZ(i) + points.position.z;
                const dist = Math.sqrt(Math.pow(camera.position.x - vx, 2) + Math.pow(camera.position.y - vy, 2) + Math.pow(camera.position.z - vz, 2));
                let fade = 1.0 - (dist / 40);
                fade = Math.max(0.2, Math.min(1.0, fade));
                colorAttr.setXYZ(i, baseColor.r * fade, baseColor.g * fade, baseColor.b * fade);
            }

            if (intersects.length > 0) {
                const index = intersects[0].index;
                colorAttr.setXYZ(index, highlightColor.r, highlightColor.g, highlightColor.b);
            } 
            colorAttr.needsUpdate = true;
            points.rotation.y += 0.001;
            points.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
